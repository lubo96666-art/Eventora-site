spring.datasource.url=jdbc:h2:file:./eventora-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

spring.application.name=eventora
server.port=8080

# H2 база по подразбиране - работи без Docker и без MySQL.
# Данните се пазят локално във файл eventora-db.mv.db в главната папка на проекта.

spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.path=/h2-console

# Email настройки. Сайтът стартира и без тях.
# За реално изпращане сложи Gmail + App Password като Environment Variables:
# MAIL_USERNAME=your_email@gmail.com
# MAIL_PASSWORD=your_app_password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:YOUR_EMAIL@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.base-url=${APP_BASE_URL:http://localhost:8080}
