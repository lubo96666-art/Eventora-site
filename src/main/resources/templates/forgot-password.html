<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Забравена парола</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav class="top-nav"><a href="/visualization">Eventora</a><a href="/login">Вход</a></nav>
<main class="form">
    <h1>Забравена парола</h1>
    <p class="hint">Въведи имейла си и ще получиш линк за смяна на паролата.</p>
    <form method="post" action="/forgot-password" th:object="${forgotPasswordDto}">
        <label>Имейл<input type="email" th:field="*{email}" placeholder="you@example.com"></label>
        <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        <button type="submit">Изпрати линк</button>
    </form>
</main>
</body>
</html>
