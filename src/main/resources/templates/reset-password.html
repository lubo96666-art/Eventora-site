<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Нова парола</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav class="top-nav"><a href="/visualization">Eventora</a><a href="/login">Вход</a></nav>
<main class="form">
    <h1>Нова парола</h1>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form method="post" action="/reset-password" th:object="${resetPasswordDto}">
        <input type="hidden" th:field="*{token}">
        <label>Нова парола<input type="password" th:field="*{password}"></label>
        <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        <label>Повтори парола<input type="password" th:field="*{confirmPassword}"></label>
        <small th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
        <button type="submit">Смени парола</button>
    </form>
</main>
</body>
</html>
