<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ · Събития</title>
    <style>
        body{font-family:Inter,Arial,sans-serif;margin:0;background:#f5f7fb;color:#141927}.top{background:#071020;color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}.top a{color:#fff;text-decoration:none;font-weight:900;margin-left:14px}.wrap{max-width:1180px;margin:30px auto;padding:0 20px}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}.primary{background:#00d084;color:#071020}.danger{background:#ffe8ec;color:#bb1230}.dark{background:#111936;color:white}table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(13,23,48,.08)}th,td{padding:14px;border-bottom:1px solid #edf1f7;text-align:left}th{background:#0b1020;color:#fff}.actions{display:flex;gap:8px;align-items:center}.actions form{margin:0}.price{font-weight:900}.muted{color:#687285}
    </style>
</head>
<body>
<div class="top"><strong>Eventora Admin</strong><div><a href="/visualization">Към сайта</a><a href="/admin/events/create">+ Ново събитие</a></div></div>
<main class="wrap">
    <h1>Управление на събития</h1>
    <p class="muted">Пълен CRUD за основната domain entity Event: създаване, преглед, редакция и изтриване.</p>
    <table>
        <thead><tr><th>Събитие</th><th>Категория</th><th>Зала</th><th>Дата</th><th>Цена</th><th>Места</th><th>Действия</th></tr></thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td><strong th:text="${event.title}">Event</strong></td>
            <td th:text="${event.category}">Категория</td>
            <td th:text="${event.location}">Зала</td>
            <td th:text="${#temporals.format(event.startsAt,'dd.MM.yyyy HH:mm')}">Дата</td>
            <td class="price" th:text="${#numbers.formatDecimal(event.price,1,2)} + ' €'">0.00 €</td>
            <td th:text="${event.availableSeats}">0</td>
            <td class="actions"><a class="btn dark" th:href="@{/admin/events/{id}/edit(id=${event.id})}">Редактирай</a><form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post" onsubmit="return confirm('Да изтрия ли събитието?')"><button class="btn danger" type="submit">Изтрий</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
